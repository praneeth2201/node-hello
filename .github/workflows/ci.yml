name: Node.js CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]  # Start with just one version first
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Check if app starts
      run: |
        timeout 10s npm start || echo "Server start check completed"
    
    - name: List files
      run: ls -la
      
    - name: Show Node.js and npm versions
      run: |
        node --version
        npm --version